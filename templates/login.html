<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In &mdash; ScoreIQ</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <!-- Shared design tokens -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { background: #f5f5f5; }

        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 16px 60px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,.10);
            padding: 44px 40px 36px;
        }

        .auth-card .brand {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--black, #0a0a0a);
            margin-bottom: 6px;
            display: inline-block;
            text-decoration: none;
        }
        .auth-card .brand span { color: var(--accent, #FFE600); }

        .auth-card h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--black, #0a0a0a);
            margin: 0 0 6px;
        }
        .auth-card .subtitle {
            font-size: .88rem;
            color: #666;
            margin-bottom: 28px;
        }

        .form-label {
            font-size: .82rem;
            font-weight: 700;
            letter-spacing: .4px;
            color: #333;
            text-transform: uppercase;
        }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            padding: 11px 14px;
            font-size: .93rem;
            transition: border-color .2s;
        }
        .form-control:focus {
            border-color: var(--black, #0a0a0a);
            box-shadow: none;
        }

        .btn-auth {
            background: var(--black, #0a0a0a);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 13px 0;
            font-size: .95rem;
            font-weight: 800;
            letter-spacing: -.2px;
            width: 100%;
            transition: background .2s, transform .15s;
        }
        .btn-auth:hover {
            background: #222;
            transform: translateY(-1px);
        }

        .auth-footer {
            text-align: center;
            font-size: .85rem;
            color: #666;
            margin-top: 22px;
        }
        .auth-footer a {
            color: var(--black, #0a0a0a);
            font-weight: 700;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }

        .alert { border-radius: 12px; font-size: .88rem; }

        /* ── OAuth divider ── */
        .oauth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 16px;
            color: #999;
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .4px;
            text-transform: uppercase;
        }
        .oauth-divider::before,
        .oauth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }
        .btn-oauth-github {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #24292e;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.15rem;
            text-decoration: none;
            transition: background .2s, transform .15s;
            margin: 0 auto;
        }
        .btn-oauth-github:hover {
            background: #1a1e22;
            transform: translateY(-1px);
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="nav">
        <a href="/" class="nav-logo">Score<span>IQ</span></a>
        <div style="display:flex;gap:12px;align-items:center;">
            <a href="{{ url_for('signup') }}"
               style="font-size:.85rem;font-weight:700;color:var(--gray-2);text-decoration:none;letter-spacing:-.2px;">
                Sign Up
            </a>
            <a href="/" class="nav-cta">&#8592; Home</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">

            <a href="/" class="brand">Score<span>IQ</span></a>
            <h1>Welcome back</h1>
            <p class="subtitle">Log in to your ScoreIQ account.</p>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'danger' else ('success' if category == 'success' else 'info') }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" novalidate>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email"
                           class="form-control"
                           id="email"
                           name="email"
                           placeholder="you@example.com"
                           required
                           autocomplete="email">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="Your password"
                           required
                           autocomplete="current-password">
                </div>

                <button type="submit" class="btn-auth">Log In &rarr;</button>
            </form>

            <!-- OAuth divider -->
            <div class="oauth-divider">or</div>
            <a href="{{ url_for('login_github') }}" class="btn-oauth-github" title="Continue with GitHub" aria-label="Continue with GitHub">
                <i class="fab fa-github"></i>
            </a>

            <p class="auth-footer">
                Don&rsquo;t have an account?
                <a href="{{ url_for('signup') }}">Sign up</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmAMfQrJn+VaGFUDRJpRgxbGOfsc"
            crossorigin="anonymous"></script>
</body>
</html>
